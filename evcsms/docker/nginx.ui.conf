server {
    listen 80;
    server_name _;
    absolute_redirect off;

    # Use Docker DNS for runtime name resolution (prevents startup race on api-service).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_upstream api-service:8000;

    root /usr/share/nginx/html;
    index index.html;

    # Tell crawlers not to index or follow links on any page of this private portal.
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # Keep older bookmarks working while the UI moves away from /ui/*.
    location ^~ /ui/ {
        rewrite ^/ui/(.*)$ /$1 redirect;
    }

    location /api/ {
        proxy_pass http://$api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://$api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Local/dev-friendly cache policy so frontend changes are reflected immediately.
    location ~* \.(css|js|mjs|html)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Robots-Tag "noindex, nofollow" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

