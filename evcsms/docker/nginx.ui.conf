server {
    listen 80;
    server_name _;
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Keep older bookmarks working while the UI moves away from /ui/*.
    location ^~ /ui/ {
        rewrite ^/ui/(.*)$ /$1 redirect;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

