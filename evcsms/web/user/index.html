<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>TakoramaCharge – Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">

      <!-- BRAND -->
      <a class="navbar-brand d-flex align-items-center js-go-dashboard" href="javascript:void(0)">
        <img src="/assets/logo_trans_vit.png"
             srcset="/assets/logo_trans_vit.png 1x, /assets/logo_trans_vit.png 2x"
             class="brand-logo" alt="TakoramaCharge">
        <span class="brand-text ms-2">Dashboard</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"
              aria-controls="navMain" aria-expanded="false" aria-label="Visa meny">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navMain">
        <ul class="navbar-nav align-items-center gap-2">

          <!-- Dashboard -->
          <li class="nav-item">
            <a href="javascript:void(0)" class="nav-link js-go-dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
          </li>

          <li class="nav-item">
            <a href="#" class="nav-link"
               data-route-portal="/ui/my.html"
               data-route-org="/ui/org/my.html"
               data-route-user="/ui/user/my.html">
              <i class="bi bi-person-badge"></i> Min statistik
            </a>
          </li>


          <!-- Inloggad + Logout -->
          <li class="nav-item"><span id="me-display" class="navbar-text small text-light opacity-75"></span></li>
          <li class="nav-item">
            <button class="btn btn-outline-light btn-sm" id="btnLogout" type="button">
              <i class="bi bi-box-arrow-right"></i> Logga ut
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- SIDINNEHÅLL -->
  <main class="container my-4 app-shell">
    <div id="alerts"></div>

    <section class="page-header">
      <div>
        <h1 class="h3 m-0">Alla laddare</h1>
        <p class="page-subtitle">Se aktuell status för dina tillgängliga laddare </p>
      </div>
    </section>

    <div id="cp-status-cards" class="row g-3 stats-grid">
      <div class="col-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><div class="small text-muted">Totalt</div><div class="h3 m-0 skeleton" style="height:2rem;"></div></div></div></div>
      <div class="col-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><div class="small text-muted">Charging</div><div class="h3 m-0 skeleton" style="height:2rem;"></div></div></div></div>
      <div class="col-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><div class="small text-muted">Available</div><div class="h3 m-0 skeleton" style="height:2rem;"></div></div></div></div>
      <div class="col-6 col-lg-3"><div class="card border-0 shadow-sm"><div class="card-body"><div class="small text-muted">Faulted</div><div class="h3 m-0 skeleton" style="height:2rem;"></div></div></div></div>
    </div>
    <div id="cp-grid" class="row g-3">
      <div class="col-12 col-md-6 col-lg-4"><div class="card border-0 shadow-sm h-100"><div class="card-body"><div class="skeleton" style="height:1.2rem;max-width:70%;"></div><div class="skeleton mt-3" style="height:1rem;"></div><div class="skeleton mt-2" style="height:1rem;"></div></div></div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="card border-0 shadow-sm h-100"><div class="card-body"><div class="skeleton" style="height:1.2rem;max-width:70%;"></div><div class="skeleton mt-3" style="height:1rem;"></div><div class="skeleton mt-2" style="height:1rem;"></div></div></div></div>
      <div class="col-12 col-md-6 col-lg-4"><div class="card border-0 shadow-sm h-100"><div class="card-body"><div class="skeleton" style="height:1.2rem;max-width:70%;"></div><div class="skeleton mt-3" style="height:1rem;"></div><div class="skeleton mt-2" style="height:1rem;"></div></div></div></div>
    </div>

    <hr class="my-4"/>

    <section class="status-legend-panel">
      <ul class="list-inline mb-0">
        <li class="list-inline-item"><span class="badge status-charging">Charging</span></li>
        <li class="list-inline-item"><span class="badge status-available">Available</span></li>
        <li class="list-inline-item"><span class="badge status-preparing">Preparing/Finishing</span></li>
        <li class="list-inline-item"><span class="badge status-suspended">Suspended</span></li>
        <li class="list-inline-item"><span class="badge status-faulted">Faulted</span></li>
        <li class="list-inline-item"><span class="badge status-unavailable">Unavailable</span></li>
      </ul>
    </section>


  </main>

  <footer class="text-center text-muted small py-3"></footer>

  <!-- JS (ordning är viktig) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/ui-common.js"></script>
  <script src="/assets/user_index.js?v=2"></script>
</body>
</html>
