<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>TakoramaCharge – Logga in</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
</head>
<body class="login-page d-flex align-items-center" style="min-height: 100vh;">
  <div class="login-bg-overlay" aria-hidden="true"></div>

  <main class="container login-content" style="max-width: 420px;">
    <div class="card shadow-sm login-card">
      <div class="card-body">
        <div class="text-center mb-3">
          <img src="assets/logo_trans_vit.png" class="brand-logo-login" alt="Logo">
          <h1 class="h5 mt-2">Logga in</h1>
        </div>
        <div id="alerts"></div>
        <form id="login-form" class="needs-validation" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">E‑post</label>
            <input id="email" type="email" class="form-control" placeholder="namn@email.se" required>
            <div class="invalid-feedback">Ange en giltig e‑post.</div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Lösenord</label>
            <input id="password" type="password" class="form-control" required>
            <div class="invalid-feedback">Ange lösenord.</div>
          </div>
          <button id="btnLogin" class="btn btn-primary w-100" type="submit">
            <span class="login-label">Logga in</span>
            <span class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true" id="login-spinner"></span>
          </button>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/login.js"></script>
</body>
</html>
