<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>TakoramaCharge – Historik</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-light">

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
      <a href="javascript:void(0)" class="navbar-brand d-flex align-items-center js-go-dashboard">
        <img src="/assets/logo_trans_vit.png" srcset="/assets/logo_trans_vit.png 2x"
             class="brand-logo" alt="TakoramaCharge">
        <span class="brand-text ms-2">Historik</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse justify-content-end" id="navMain">
        <ul class="navbar-nav align-items-center gap-2">
          <li class="nav-item"><a href="javascript:void(0)" class="nav-link js-go-dashboard"><i class="bi bi-speedometer2"></i> Överblick</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/portal/add_user.html" data-route-org="/ui/org/add_user.html" data-route-user="/ui/user/index.html"><i class="bi bi-person-plus"></i> Användare</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/users_history.html" data-route-org="/ui/org/history.html" data-route-user="/ui/user/index.html"><i class="bi bi-clock-history"></i> Historik</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/my.html" data-route-org="/ui/org/my.html" data-route-user="/ui/user/my.html"><i class="bi bi-person-badge"></i> Min statistik</a></li>


          <li class="nav-item"><span id="me-display" class="navbar-text small text-light opacity-75"></span></li>
          <li class="nav-item"><button id="btnLogout" class="btn btn-outline-light btn-sm" type="button"><i class="bi bi-box-arrow-right"></i> Logga ut</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- INNEHÅLL -->
  <main class="container my-4 app-shell">
    <div id="page-alerts"></div>
    <div id="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <section class="page-header">
      <div>
        <h1 class="h4 m-0">Historik</h1>
        <p class="page-subtitle">Följ laddsessioner över tid, filtrera och exportera data.</p>
      </div>
    </section>

    <!-- Filterrad -->
    <div class="row g-3 align-items-end mb-3 toolbar-panel">
      <div class="col-12 col-md-3">
        <label for="days" class="form-label">Dagar</label>
        <input id="days" type="number" min="1" max="365" class="form-control" value="30">
      </div>
      <div class="col-12 col-md-5">
        <label for="tagFilter" class="form-label"><i class="bi bi-upc-scan"></i> RFID (valfritt)</label>
        <input id="tagFilter" type="text" class="form-control" placeholder="Ex: 04AABBCCDD">
      </div>
      <div class="col-6 col-md-2 d-grid">
        <button id="btnRefresh" class="btn btn-outline-secondary" type="button"><i class="bi bi-arrow-clockwise"></i> Uppdatera</button>
      </div>
      <div class="col-6 col-md-2 d-grid">
        <button id="btnExportCsv" class="btn btn-success" type="button"><i class="bi bi-filetype-csv"></i> Exportera CSV</button>
      </div>
    </div>

    <div class="table-responsive shadow-sm table-panel">
      <table class="table table-sm table-striped align-middle" id="hist-table">
        <thead class="table-dark"><tr><th>Sluttid</th><th>Namn</th><th>RFID</th><th>Laddare</th><th>Uttag</th><th>Energi (kWh)</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="text-muted small mt-2" id="listFootnote"></div>

    <div class="back-link-wrap">
      <a href="#" class="js-go-dashboard back-link">← Tillbaka till överblick</a>
    </div>
  </main>

  <footer class="text-center text-muted small py-3"></footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/ui-common.js"></script>
  <script src="/assets/org_history.js?v=2"></script>
</body>
</html>
