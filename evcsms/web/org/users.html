<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <title>TakoramaCharge – Användare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-3">
    <div class="container-fluid">
      <a href="javascript:void(0)" class="navbar-brand d-flex align-items-center js-go-dashboard">
        <img src="/assets/logo_trans_vit.png" srcset="/assets/logo_trans_vit.png 2x"
             class="brand-logo" alt="TakoramaCharge">
        <span class="brand-text ms-2">Användare</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse justify-content-end" id="navMain">
        <ul class="navbar-nav align-items-center gap-2">
          <li class="nav-item"><a href="javascript:void(0)" class="nav-link js-go-dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/portal/add_user.html" data-route-org="/ui/org/add_user.html" data-route-user="/ui/user/index.html"><i class="bi bi-person-plus"></i> Lägg till användare</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/users.html" data-route-org="/ui/org/users.html" data-route-user="/ui/user/index.html"><i class="bi bi-people"></i> Användare</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/users_history.html" data-route-org="/ui/org/history.html" data-route-user="/ui/user/index.html"><i class="bi bi-clock-history"></i> Historik</a></li>
          <li class="nav-item"><a href="#" class="nav-link" data-route-portal="/ui/my.html" data-route-org="/ui/org/my.html" data-route-user="/ui/user/my.html"><i class="bi bi-person-badge"></i> Min statistik</a></li>


          <li class="nav-item"><span id="me-display" class="navbar-text small text-light opacity-75"></span></li>
          <li class="nav-item"><button id="btnLogout" class="btn btn-outline-light btn-sm" type="button"><i class="bi bi-box-arrow-right"></i> Logga ut</button></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- INNEHÅLL -->
  <main class="container my-4 app-shell">
    <div id="page-alerts"></div>
    <div id="toast-stack" aria-live="polite" aria-atomic="true"></div>

    <section class="page-header">
      <div>
        <h1 class="h4 m-0">Användare</h1>
        <p class="page-subtitle">Hantera organisationens användare, sök snabbt och uppdatera listan vid behov.</p>
      </div>
    </section>

    <div class="d-flex flex-wrap gap-2 align-items-end mb-3 toolbar-panel">
      <div class="input-group input-group-sm" style="max-width: 320px;">
        <span class="input-group-text">Sök</span>
        <input id="filterInput" type="text" class="form-control" placeholder="Namn eller RFID...">
      </div>
      <button class="btn btn-sm btn-outline-secondary" id="btnRefresh" type="button">
        <i class="bi bi-arrow-clockwise"></i> Uppdatera lista
      </button>
    </div>

    <div class="table-responsive shadow-sm table-panel">
      <table class="table table-sm table-striped align-middle" id="users-table">
        <thead class="table-dark">
          <tr><th>Namn</th><th>RFID</th><th class="text-end" style="width:160px;">Åtgärd</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="text-muted small mt-2" id="listFootnote"></div>

    <div class="back-link-wrap">
      <a href="#" class="js-go-dashboard back-link">← Tillbaka till dashboard</a>
    </div>
  </main>

  <footer class="text-center text-muted small py-3"></footer>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/assets/ui-common.js"></script>
  <script src="/assets/org_users.js?v=1"></script>
